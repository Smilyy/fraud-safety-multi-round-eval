name: fraud-eval
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pytorch>=2.2
  - torchvision
  - pytorch-cuda=12.4
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - pip
  - pip:
    - torch-geometric>=2.5
    - transformers>=4.40

# Developed with: torch 2.11 dev (cu128), torch-geometric 2.7, transformers 5.3, Python 3.11.
# Any torch >= 2.2 with CUDA 12.x should reproduce the results.
#
# Setup:
#   conda env create -f environment.yml
#   conda activate fraud-eval
#
# CPU-only (no GPU):
#   Replace pytorch-cuda=12.4 with cpuonly
